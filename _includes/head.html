<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% if page.robots %}<meta name="robots" content="{{ page.robots }}">{% endif %}
<meta name="theme-color" content="{{ page.theme_color | default: '#e94b77' }}">
{% seo %}
<meta property="og:site_name" content="{{ site.title }}">
{% if page.date %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">{% endif %}
{% if page.modified %}<meta property="article:modified_time" content="{{ page.modified | date_to_xmlschema }}">{% endif %}
<link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
{% assign css_name = page.css | default: layout.css | default: 'home' %}
{% assign asset_version = site.time | date: '%s' %}
<link rel="stylesheet" href="{{ '/assets/css/tokens.css' | relative_url }}?v={{ asset_version }}">
<link rel="stylesheet" href="{{ '/assets/css/' | append: css_name | append: '.css' | relative_url }}?v={{ asset_version }}">
