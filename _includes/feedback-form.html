{% if site.feedback_form_url and page.feedback != false %}
  <section class="section feedback-section" id="feedback" aria-labelledby="feedback-heading">
    <div class="feedback-summary">
      <div>
        <h2 class="section-title green" id="feedback-heading">感想・情報提供</h2>
        <p>GitHubアカウントなしでも送信できます。個人情報や公開したくない情報は記入しないでください。</p>
      </div>
      <a class="feedback-button" href="{{ site.feedback_form_url }}" target="_blank" rel="noopener noreferrer">フォームを開く</a>
    </div>
  </section>
{% endif %}
